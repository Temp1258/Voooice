apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tts-voice-data-pvc
  namespace: voooice
  labels:
    app.kubernetes.io/name: tts
    app.kubernetes.io/part-of: vocaltext
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts
  namespace: voooice
  labels:
    app.kubernetes.io/name: tts
    app.kubernetes.io/part-of: vocaltext
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tts
        app.kubernetes.io/part-of: vocaltext
    spec:
      containers:
        - name: python
          image: vocaltext/tts-server:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: voice-data
              mountPath: /app/voice-data
      volumes:
        - name: voice-data
          persistentVolumeClaim:
            claimName: tts-voice-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tts
  namespace: voooice
  labels:
    app.kubernetes.io/name: tts
    app.kubernetes.io/part-of: vocaltext
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tts
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP

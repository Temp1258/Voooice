apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-sqlite-pvc
  namespace: voooice
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: vocaltext
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: voooice
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: vocaltext
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: vocaltext
    spec:
      containers:
        - name: node
          image: vocaltext/backend:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vocaltext-secrets
                  key: JWT_SECRET
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vocaltext-secrets
                  key: ELEVENLABS_API_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: vocaltext-secrets
                  key: STRIPE_WEBHOOK_SECRET
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: backend-sqlite-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: voooice
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: vocaltext
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP

# =============================================================
# VocalText CDN / Static Asset Nginx Configuration
# Optimized for serving through a CDN edge (CloudFront, etc.)
# =============================================================

# Map for WebP support detection
map $http_accept $webp_suffix {
    default   "";
    "~*webp"  ".webp";
}

# Map for AVIF support detection (preferred over WebP)
map $http_accept $avif_suffix {
    default   "";
    "~*avif"  ".avif";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        font/opentype
        font/eot
        image/svg+xml
        image/x-icon;

    # -----------------------------------------------------------
    # Brotli compression (requires ngx_brotli module)
    # -----------------------------------------------------------
    # brotli on;
    # brotli_comp_level 6;
    # brotli_static on;
    # brotli_types
    #     text/plain
    #     text/css
    #     text/xml
    #     text/javascript
    #     application/javascript
    #     application/json
    #     application/xml
    #     application/rss+xml
    #     application/vnd.ms-fontobject
    #     application/x-font-ttf
    #     font/opentype
    #     image/svg+xml;

    # -----------------------------------------------------------
    # Security headers (mirrored from nginx.conf)
    # -----------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' http://backend:3001 http://tts:8000 https://api.elevenlabs.io; font-src 'self' data:; worker-src 'self' blob:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # -----------------------------------------------------------
    # HTML pages - no-cache with ETag validation
    # -----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # HTML must always revalidate so users get fresh deploys
        add_header Cache-Control "no-cache, must-revalidate" always;
        etag on;

        # Re-apply security headers (add_header in a location block
        # overrides those at the server level in nginx)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' http://backend:3001 http://tts:8000 https://api.elevenlabs.io; font-src 'self' data:; worker-src 'self' blob:;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Preload hints for critical assets
        # Adjust paths to match your Vite build output
        add_header Link "</assets/index.css>; rel=preload; as=style, </assets/index.js>; rel=preload; as=script" always;
    }

    # -----------------------------------------------------------
    # Hashed static assets - aggressive 1-year cache
    # Vite produces filenames like /assets/index-abc123.js
    # -----------------------------------------------------------
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Enable gzip for pre-compressed files if available
        gzip_static on;

        # Allow cross-origin access for CDN-served assets
        add_header Access-Control-Allow-Origin "*" always;
    }

    # -----------------------------------------------------------
    # Image format negotiation (WebP / AVIF)
    # Serves optimised formats when the browser supports them
    # Requires .webp / .avif variants alongside originals
    # -----------------------------------------------------------
    location ~* \.(png|jpe?g)$ {
        # Try AVIF first, then WebP, then the original
        try_files $uri$avif_suffix $uri$webp_suffix $uri =404;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header Vary "Accept" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -----------------------------------------------------------
    # Other static assets (fonts, icons, SVGs, etc.)
    # -----------------------------------------------------------
    location ~* \.(ico|svg|woff2?|eot|ttf|otf|gif)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # -----------------------------------------------------------
    # Service worker - must not be cached by CDN
    # -----------------------------------------------------------
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -----------------------------------------------------------
    # Manifest and browserconfig
    # -----------------------------------------------------------
    location ~* \.(webmanifest|manifest\.json|browserconfig\.xml)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -----------------------------------------------------------
    # API proxy to Node backend
    # -----------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 10m;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # -----------------------------------------------------------
    # TTS proxy to FastAPI
    # -----------------------------------------------------------
    location /v1/ {
        proxy_pass http://tts:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 10m;

        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 30s;
    }

    # -----------------------------------------------------------
    # Deny access to hidden files
    # -----------------------------------------------------------
    location ~ /\. {
        deny all;
        return 404;
    }
}

version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
      - tts
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: ../server/Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  tts:
    build:
      context: ./tts-server
      dockerfile: Dockerfile
    ports:
      - "${TTS_PORT:-8000}:8000"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    volumes:
      - tts-data:/app/data
    restart: unless-stopped

volumes:
  backend-data:
  tts-data:
